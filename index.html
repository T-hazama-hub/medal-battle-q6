<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10151d">
  <meta name="color-scheme" content="dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Medal Battle Prototype</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="play-area" aria-label="Medal battle prototype">
      <div class="topbar">
        <div>
          <h1>Medal Battle Prototype <span id="appVersion" class="app-version"></span></h1>
          <p id="phaseText">味方ターン</p>
        </div>
        <button id="resetButton" type="button">リセット</button>
      </div>
      <div class="field-wrap">
        <canvas id="gameCanvas" width="720" height="960" aria-label="battle field"></canvas>
        <div id="partyDetail" class="party-detail" aria-live="polite" hidden></div>
      </div>
      <section class="party-hud" aria-label="ally status">
        <div class="cs-row">
          <span class="cs-label">CS</span>
          <div class="cs-track" aria-label="command skill gauge">
            <div id="csGaugeFill" class="cs-fill"></div>
          </div>
          <span id="csGaugeText" class="cs-value">0 / 100</span>
        </div>
        <div id="partyCards" class="party-cards"></div>
        <div id="csStandbyInfo" class="cs-standby-info" hidden></div>
      </section>
    </section>

    <aside class="side-panel">
      <section class="panel-block">
        <h2>Active Medal</h2>
        <div id="activeStats" class="stat-grid"></div>
      </section>
      <section class="panel-block">
        <h2>Battle Log</h2>
        <ol id="battleLog" class="battle-log"></ol>
      </section>
    </aside>
  </main>

  <script src="./game.js"></script>
  <script>
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>
</body>
</html>
